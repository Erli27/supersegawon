<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Segawon Adventure (Mobile Ready)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            border: 2px solid #fff;
            max-width: 100%;
            max-height: 60vh; /* Sisakan ruang bawah untuk tombol HP */
            box-shadow: 0px 0px 30px rgba(0,0,0,0.8);
            background: linear-gradient(to bottom, #4A90E2, #87CEEB);
        }
        /* Kontrol Khusus HP Android */
        .mobile-controls {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 800px;
            margin-top: 15px;
            padding: 10px;
        }
        .d-pad {
            display: flex;
            gap: 15px;
        }
        .btn {
            width: 65px;
            height: 65px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }
        .btn:active {
            background-color: rgba(255, 255, 255, 0.6);
            transform: scale(0.9);
        }
        .btn-jump {
            background-color: rgba(255, 0, 0, 0.3);
            border-color: #FF0000;
            width: 75px;
            height: 75px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <!-- Tombol Kontrol Layar Sentuh untuk HP Android -->
    <div class="mobile-controls">
        <div class="d-pad">
            <div class="btn" id="btnLeft">◀️</div>
            <div class="btn" id="btnRight">▶️</div>
        </div>
        <div class="btn btn-jump" id="btnJump">🚀</div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- 🖼️ LOAD LOGO IMAGES WITH STATUS DETECTOR ---
    let mokoLoaded = false;
    let smkLoaded = false;

    const logoMoko = new Image();
    logoMoko.src = "logo smk.jpeg"; // Disesuaikan dengan file WhatsApp Image kamu
    logoMoko.onload = () => { mokoLoaded = true; };

    const logoSmk = new Image();
    logoSmk.src = "logo smk.jpg"; // Diarahkan ke file logo smk.jpg di GitHub kamu
    logoSmk.onload = () => { smkLoaded = true; };

    // --- GAME CONFIG ---
    const FPS = 60;
    const FLOOR_Y = 420;
    
    let currentWorldWidth = 3000; // Panjang peta dinamis per level
    let score = 0;
    let lives = 3;
    let gameOver = false;
    let win = false;
    let totalWin = false; 
    let keys = {};
    let gameTime = 0;
    let camera = { x: 0 };

    // --- 🏆 SYSTEM LEVEL ---
    let currentLevel = 1;
    const maxLevels = 3;

    // --- 🐾 OBJECT: SUPER SEGAWON ---
    const segawon = {
        x: 100, y: 300, width: 50, height: 40,
        speed: 6, velY: 0, gravity: 0.6, jumpPower: -14,
        isJumping: false, facing: 'right',
        
        draw() {
            ctx.save();
            ctx.translate(this.x - camera.x, this.y);
            
            if (this.facing === 'left') {
                ctx.scale(-1, 1);
                ctx.translate(-this.width, 0);
            }

            // Tubuh Cokelat
            ctx.fillStyle = "#8B4513"; 
            ctx.fillRect(5, 10, 40, 25); 
            ctx.fillRect(30, 0, 15, 15); 
            
            // Telinga, Mata, Hidung
            ctx.fillStyle = "#5C2E0B"; ctx.fillRect(28, -2, 6, 8);
            ctx.fillStyle = "#000"; ctx.fillRect(41, 3, 3, 3); ctx.fillRect(44, 7, 2, 2);

            // Kaki Animasi
            ctx.fillStyle = "#5C2E0B";
            let legOffset = Math.sin(gameTime * 0.2) * 5;
            if (!this.isJumping && (keys['ArrowRight'] || keys['ArrowLeft'])) {
                ctx.fillRect(10, 35, 6, 8 + legOffset);
                ctx.fillRect(32, 35, 6, 8 - legOffset);
            } else {
                ctx.fillRect(10, 35, 6, 8); ctx.fillRect(32, 35, 6, 8);
            }

            // Ekor & Syal Merah
            let tailWag = Math.sin(gameTime * 0.3) * 3;
            ctx.fillStyle = "#8B4513"; ctx.fillRect(-2, 12 + tailWag, 8, 6);
            ctx.fillStyle = "#FF0000"; ctx.fillRect(26, 12, 10, 8); ctx.fillRect(20, 18 + (tailWag * 0.5), 12, 5);

            ctx.restore();
        },
        
        update() {
            this.velY += this.gravity;
            this.y += this.velY;

            if (this.y + this.height >= FLOOR_Y) {
                this.y = FLOOR_Y - this.height;
                this.velY = 0;
                this.isJumping = false;
            }

            // Input deteksi
            if (keys['ArrowLeft']) {
                this.x -= this.speed;
                this.facing = 'left';
            }
            if (keys['ArrowRight']) {
                this.x += this.speed;
                this.facing = 'right';
            }

            if (this.x < 0) this.x = 0;
            
            // Deteksi menyentuh garis finish dinamis sesuai ukuran map level tersebut
            if (this.x > currentWorldWidth - this.width) {
                if (currentLevel < maxLevels) {
                    win = true; 
                } else {
                    totalWin = true; 
                }
            }

            camera.x = this.x - canvas.width / 3;
            if (camera.x < 0) pandemics = 0;
            if (camera.x > currentWorldWidth - canvas.width) camera.x = currentWorldWidth - canvas.width;
        },

        jump() {
            if (!this.isJumping) {
                this.velY = this.jumpPower;
                this.isJumping = true;
            }
        }
    };

    // --- DYNAMIC GAME OBJECTS ---
    let platforms = [];
    let bones = [];
    let cats = [];

    // --- 🛠️ FUNGSI UNTUK GENERATE RINTANGAN & PANJANG MAP PER LEVEL ---
    function loadLevel(level) {
        segawon.x = 100;
        segawon.y = 300;
        segawon.velY = 0;
        win = false;

        if (level === 1) {
            currentWorldWidth = 3000;
            platforms = [
                { x: 300, y: 320, w: 120, h: 20 }, { x: 550, y: 240, w: 100, h: 20 },
                { x: 800, y: 320, w: 150, h: 20 }, { x: 1200, y: 250, w: 200, h: 20 },
                { x: 1600, y: 320, w: 100, h: 20 }, { x: 2000, y: 220, w: 150, h: 20 },
                { x: 2400, y: 300, w: 250, h: 20 }
            ];
            cats = [
                { x: 450, y: FLOOR_Y - 30, w: 35, h: 30, speed: 2, minX: 350, maxX: 600 },
                { x: 950, y: FLOOR_Y - 30, w: 35, h: 30, speed: -2, minX: 800, maxX: 1100 },
                { x: 1400, y: FLOOR_Y - 30, w: 35, h: 30, speed: 3, minX: 1250, maxX: 1550 },
                { x: 2100, y: FLOOR_Y - 30, w: 35, h: 30, speed: -2.5, minX: 1950, maxX: 2250 }
            ];
        } else if (level === 2) {
            currentWorldWidth = 4500;
            platforms = [
                { x: 300, y: 280, w: 100, h: 20 }, { x: 600, y: 340, w: 150, h: 20 },
                { x: 900, y: 220, w: 100, h: 20 }, { x: 1300, y: 300, w: 120, h: 20 },
                { x: 1700, y: 200, w: 100, h: 20 }, { x: 2100, y: 280, w: 200, h: 20 },
                { x: 2600, y: 240, w: 150, h: 20 }, { x: 3100, y: 300, w: 120, h: 20 },
                { x: 3600, y: 220, w: 140, h: 20 }, { x: 4000, y: 280, w: 180, h: 20 }
            ];
            cats = [
                { x: 450, y: FLOOR_Y - 30, w: 35, h: 30, speed: 3.5, minX: 350, maxX: 650 },
                { x: 1050, y: FLOOR_Y - 30, w: 35, h: 30, speed: -3.5, minX: 900, maxX: 1250 },
                { x: 1850, y: FLOOR_Y - 30, w: 35, h: 30, speed: 4, minX: 1600, maxX: 2000 },
                { x: 2350, y: FLOOR_Y - 30, w: 35, h: 30, speed: -4, minX: 2150, maxX: 2500 },
                { x: 3350, y: FLOOR_Y - 30, w: 35, h: 30, speed: 4.5, minX: 3150, maxX: 3550 },
                { x: 3850, y: FLOOR_Y - 30, w: 35, h: 30, speed: -4.5, minX: 3650, maxX: 4100 }
            ];
        } else if (level === 3) {
            currentWorldWidth = 6000;
            platforms = [
                { x: 300, y: 250, w: 80, h: 20 }, { x: 650, y: 220, w: 80, h: 20 },
                { x: 1000, y: 300, w: 100, h: 20 }, { x: 1400, y: 240, w: 80, h: 20 },
                { x: 1800, y: 200, w: 80, h: 20 }, { x: 2200, y: 280, w: 120, h: 20 },
                { x: 2700, y: 220, w: 100, h: 20 }, { x: 3200, y: 260, w: 90, h: 20 },
                { x: 3700, y: 300, w: 80, h: 20 }, { x: 4200, y: 210, w: 100, h: 20 },
                { x: 4700, y: 270, w: 90, h: 20 }, { x: 5200, y: 230, w: 120, h: 20 },
                { x: 5500, y: 310, w: 100, h: 20 }
            ];
            cats = [
                { x: 450, y: FLOOR_Y - 30, w: 35, h: 30, speed: 5, minX: 300, maxX: 700 },
                { x: 1150, y: FLOOR_Y - 30, w: 35, h: 30, speed: -5, minX: 950, maxX: 1300 },
                { x: 1600, y: FLOOR_Y - 30, w: 35, h: 30, speed: 5.5, minX: 1450, maxX: 1750 },
                { x: 2400, y: FLOOR_Y - 30, w: 35, h: 30, speed: -6, minX: 2200, maxX: 2600 },
                { x: 3400, y: FLOOR_Y - 30, w: 35, h: 30, speed: 6, minX: 3200, maxX: 3600 },
                { x: 4400, y: FLOOR_Y - 30, w: 35, h: 30, speed: -6.5, minX: 4200, maxX: 4650 },
                { x: 4950, y: FLOOR_Y - 30, w: 35, h: 30, speed: 7, minX: 4750, maxX: 5100 },
                { x: 5400, y: FLOOR_Y - 30, w: 35, h: 30, speed: -7.5, minX: 5250, maxX: 5600 }
            ];
        }

        bones = [];
        let totalBones = level === 1 ? 25 : level === 2 ? 40 : 55;
        for(let i = 0; i < totalBones; i++) {
            bones.push({ x: 250 + (i * 105) + Math.random() * 25, y: Math.random() * 150 + 200, w: 24, h: 14, collected: false });
        }
    }

    loadLevel(currentLevel);

    // --- 📱 MOBILES TOUCH CONTROLS LOGIC ---
    const bLeft = document.getElementById('btnLeft');
    const bRight = document.getElementById('btnRight');
    const bJump = document.getElementById('btnJump');

    bLeft.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowLeft'] = true; });
    bLeft.addEventListener('touchend', () => keys['ArrowLeft'] = false);
    
    bRight.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowRight'] = true; });
    bRight.addEventListener('touchend', () => keys['ArrowRight'] = false);
    
    bJump.addEventListener('touchstart', (e) => { 
        e.preventDefault(); 
        if (gameOver || totalWin) {
            location.reload(); 
        } else if (win) {
            currentLevel++;   
            loadLevel(currentLevel);
        } else {
            segawon.jump(); 
        }
    });

    // --- ⌨️ LAPTOP KEYBOARD CONTROLS ---
    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft' || e.key === 'a') keys['ArrowLeft'] = true;
        if (e.key === 'ArrowRight' || e.key === 'd') keys['ArrowRight'] = true;
        if (['Space', 'ArrowUp', 'w', ' '].includes(e.key)) {
            if (win && !totalWin) {
                currentLevel++;
                loadLevel(currentLevel);
            } else {
                segawon.jump();
            }
        }
        if (gameOver || totalWin) { if(e.key === 'r' || e.key === 'R') location.reload(); }
    });
    window.addEventListener('keyup', e => {
        if (e.key === 'ArrowLeft' || e.key === 'a') keys['ArrowLeft'] = false;
        if (e.key === 'ArrowRight' || e.key === 'd') keys['ArrowRight'] = false;
    });

    function isColliding(r1, r2) {
        return r1.x < r2.x + r2.w && r1.x + r1.width > r2.x && r1.y < r2.y + r2.h && r1.y + r1.height > r2.y;
    }

    // --- 🔄 ENGINE LOOP ---
    function update() {
        if (gameOver || win || totalWin) return;
        gameTime++;
        segawon.update();

        platforms.forEach(plat => {
            if (segawon.x + segawon.width > plat.x && segawon.x < plat.x + plat.w) {
                if (segawon.velY > 0 && segawon.y + segawon.height - segawon.velY <= plat.y) {
                    if (segawon.y + segawon.height >= plat.y) {
                        segawon.y = plat.y - segawon.height;
                        segawon.velY = 0;
                        segawon.isJumping = false;
                    }
                }
            }
        });

        bones.forEach(b => {
            if (!b.collected && isColliding(segawon, b)) { b.collected = true; score += 10; }
        });

        cats.forEach(cat => {
            cat.x += cat.speed;
            if (cat.x < cat.minX || cat.x > cat.maxX) cat.speed *= -1;
            if (isColliding(segawon, cat)) {
                lives--; segawon.velY = -8; segawon.x += (cat.speed > 0) ? 40 : -40;
                if (lives <= 0) gameOver = true;
            }
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Bukit Belakang
        ctx.fillStyle = "#5cb85c";
        let totalHills = Math.ceil(currentWorldWidth / 400) + 1;
        for (let i = 0; i < totalHills; i++) {
            ctx.beginPath(); ctx.arc((i * 400) - (camera.x * 0.3), 450, 250, 0, Math.PI * 2); ctx.fill();
        }

        // Tanah & Platform
        ctx.fillStyle = "#2e7d32"; ctx.fillRect(0 - camera.x, FLOOR_Y, currentWorldWidth, canvas.height - FLOOR_Y);
        ctx.fillStyle = "#4caf50"; ctx.fillRect(0 - camera.x, FLOOR_Y, currentWorldWidth, 8);
        platforms.forEach(plat => {
            ctx.fillStyle = "#A0522D"; ctx.fillRect(plat.x - camera.x, plat.y, plat.w, plat.h);
            ctx.fillStyle = "#CD853F"; ctx.fillRect(plat.x - camera.x, plat.y, plat.w, 4);
        });

        // Gambar Tulang
        bones.forEach(b => {
            if (!b.collected) {
                ctx.fillStyle = "#FFFFF0"; ctx.fillRect(b.x - camera.x + 4, b.y + 4, 16, 6);
                ctx.fillRect(b.x - camera.x, b.y, 6, 6); ctx.fillRect(b.x - camera.x, b.y + 8, 6, 6);
                ctx.fillRect(b.x - camera.x + 18, b.y, 6, 6); ctx.fillRect(b.x - camera.x + 18, b.y + 8, 6, 6);
            }
        });

        // Gambar Kucing
        cats.forEach(cat => {
            ctx.fillStyle = "#FF8C00"; ctx.fillRect(cat.x - camera.x, cat.y + 5, cat.w, cat.h - 5);
            ctx.fillRect(cat.x - camera.x + (cat.speed > 0 ? 20 : 0), cat.y, 15, 15);
            ctx.fillStyle = "#D2691E"; ctx.fillRect(cat.x - camera.x + (cat.speed > 0 ? 22 : 2), cat.y - 4, 4, 4);
            ctx.fillRect(cat.x - camera.x + (cat.speed > 0 ? 30 : 10), cat.y - 4, 4, 4);
        });

        // Tiang Finish
        ctx.fillStyle = "#FFD700"; ctx.fillRect(currentWorldWidth - 150 - camera.x, FLOOR_Y - 150, 10, 150);
        ctx.fillStyle = "#FF0000"; ctx.fillRect(currentWorldWidth - 140 - camera.x, FLOOR_Y - 150, 60, 40);

        // UI Info
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 20px 'Courier New'";
        ctx.fillText("SCORE: " + score, 20, 40);
        let hearts = ""; for(let i=0; i<lives; i++) hearts += "❤️";
        ctx.fillText("LIVES: " + hearts, 20, 70);
        
        ctx.fillText("LEVEL: " + currentLevel, 600, 40);
        ctx.fillText("PROGRESS: " + Math.round((segawon.x / currentWorldWidth) * 100) + "%", 570, 70);

        // --- 👑 FIXED WATERMARK LOGO DI LAYAR GAME (POJOK KIRI BAWAH INFO) ---
        // 1. Gambar Logo SMK
        if (smkLoaded) {
            ctx.drawImage(logoSmk, 20, 85, 45, 45);
        } else {
            // Backup Teks Kotak jika gambar SMK gagal load
            ctx.fillStyle = "#0000FF"; ctx.fillRect(20, 85, 45, 45);
            ctx.fillStyle = "#FFF"; ctx.font = "bold 10px Arial"; ctx.fillText("SMK", 30, 110);
        }
        
        // 2. Gambar Logo Moko
        if (mokoLoaded) {
            ctx.drawImage(logoMoko, 75, 85, 45, 45);
        } else {
            // Backup Teks Kotak jika gambar Moko gagal load
            ctx.fillStyle = "#333333"; ctx.fillRect(75, 85, 45, 45);
            ctx.fillStyle = "#FFF"; ctx.font = "bold 10px Arial"; ctx.fillText("MOKO", 82, 110);
        }

        // Layar Kalah
        if (gameOver) {
            ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#FF0000"; ctx.font = "bold 35px Arial"; ctx.fillText("GAME OVER", 300, 220);
            ctx.fillStyle = "#FFF"; ctx.font = "18px Arial"; ctx.fillText("Sentuh Tombol ROCKET / tekan 'R' untuk Mengulang", 200, 270);
        }
        
        // Layar Menang Level 
        if (win && !totalWin) {
            ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#FFD700"; ctx.font = "bold 35px Arial"; ctx.fillText(`LEVEL ${currentLevel} SELESAI! 🐾`, 240, 220);
            ctx.fillStyle = "#FFF"; ctx.font = "18px Arial"; ctx.fillText("Sentuh ROCKET / Tekan 'Spasi' untuk ke Level Berikutnya", 180, 270);
        }

        // Layar Tamat Total
        if (totalWin) {
            ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00FF00"; ctx.font = "bold 35px Arial"; ctx.fillText("SELAMAT! KAMU TAMAT! 👑🏆", 170, 220);
            ctx.fillStyle = "#FFF"; ctx.font = "18px Arial"; ctx.fillText("Semua level berhasil dilewati. Sentuh ROCKET untuk main dari awal", 130, 270);
        }

        segawon.draw();
    }

    function game() { update(); draw(); setTimeout(game, 1000 / FPS); }
    game();
</script>

</body>
</html>
