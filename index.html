<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Segawon Adventure (Mobile Ready)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            border: 2px solid #fff;
            max-width: 100%;
            max-height: 60vh;
            box-shadow: 0px 0px 30px rgba(0,0,0,0.8);
            background: linear-gradient(to bottom, #4A90E2, #87CEEB);
        }
        .mobile-controls {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 800px;
            margin-top: 15px;
            padding: 10px;
        }
        .d-pad {
            display: flex;
            gap: 15px;
        }
        .btn {
            width: 65px;
            height: 65px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }
        .btn:active {
            background-color: rgba(255, 255, 255, 0.6);
            transform: scale(0.9);
        }
        .btn-jump {
            background-color: rgba(255, 0, 0, 0.3);
            border-color: #FF0000;
            width: 75px;
            height: 75px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div class="mobile-controls">
        <div class="d-pad">
            <div class="btn" id="btnLeft">◀️</div>
            <div class="btn" id="btnRight">▶️</div>
        </div>
        <div class="btn btn-jump" id="btnJump">🚀</div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- 🖼️ DEKLARASI FILTER & STATUS UTAMA 3 LOGO ---
    let smkLoaded = false;
    let grupLoaded = false;
    let mokoLoaded = false;

    // 1. Logo SMK
    const logoSmk = new Image();
    logoSmk.src = "logo smk.jpg"; 
    logoSmk.onload = () => { smkLoaded = true; };

    // 2. Logo Grup
    const logoGrup = new Image();
    logoGrup.src = "logo_grup.jpeg"; 
    logoGrup.onload = () => { grupLoaded = true; };

    // 3. Logo Moko
    const logoMoko = new Image();
    logoMoko.src = "logo_moko.jpeg"; 
    logoMoko.onload = () => { mokoLoaded = true; };

    // --- GAME CONFIG ---
    const FPS = 60;
    const FLOOR_Y = 420;
    
    let currentWorldWidth = 3000;
    let score = 0;
    let lives = 3;
    let gameOver = false;
    let win = false;
    let totalWin = false; 
    let keys = {};
    let gameTime = 0;
    let camera = { x: 0 };

    let currentLevel = 1;
    const maxLevels = 3;

    // --- 🐾 OBJECT: SUPER SEGAWON ---
    const segawon = {
        x: 100, y: 300, width: 50, height: 40,
        speed: 6, velY: 0, gravity: 0.6, jumpPower: -14,
        isJumping: false, facing: 'right',
        
        draw() {
            ctx.save();
            ctx.translate(this.x - camera.x, this.y);
            
            if (this.facing === 'left') {
                ctx.scale(-1, 1);
                ctx.translate(-this.width, 0);
            }

            ctx.fillStyle = "#8B4513"; 
            ctx.fillRect(5, 10, 40, 25); 
            ctx.fillRect(30, 0, 15, 15); 
            
            ctx.fillStyle = "#5C2E0B"; ctx.fillRect(28, -2, 6, 8);
            ctx.fillStyle = "#000"; ctx.fillRect(41, 3, 3, 3); ctx.fillRect(44, 7, 2, 2);

            ctx.fillStyle = "#5C2E0B";
            let legOffset = Math.sin(gameTime * 0.2) * 5;
            if (!this.isJumping && (keys['ArrowRight'] || keys['ArrowLeft'])) {
                ctx.fillRect(10, 35, 6, 8 + legOffset);
                ctx.fillRect(32, 35, 6, 8 - legOffset);
            } else {
                ctx.fillRect(10, 35, 6, 8); ctx.fillRect(32, 35, 6, 8);
            }

            let tailWag = Math.sin(gameTime * 0.3) * 3;
            ctx.fillStyle = "#8B4513"; ctx.fillRect(-2, 12 + tailWag, 8, 6);
            ctx.fillStyle = "#FF0000"; ctx.fillRect(26, 12, 10, 8); ctx.fillRect(20, 18 + (tailWag * 0.5), 12, 5);

            ctx.restore();
        },
        
        update() {
            this.velY += this.gravity;
            this.y += this.velY;

            if (this.y + this.height >= FLOOR_Y) {
                this.y = FLOOR_Y - this.height;
                this.velY = 0;
                this.isJumping = false;
            }

            if (keys['ArrowLeft']) { this.x -= this.speed; this.facing = 'left'; }
            if (keys['ArrowRight']) { this.x += this.speed; this.facing = 'right'; }

            if (this.x < 0) this.x = 0;
            
            if (this.x > currentWorldWidth - this.width) {
                if (currentLevel < maxLevels) { win = true; } else { totalWin = true; }
            }

            camera.x = this.x - canvas.width / 3;
            if (camera.x < 0) camera.x = 0;
            if (camera.x > currentWorldWidth - canvas.width) camera.x = currentWorldWidth - canvas.width;
        },

        jump() {
            if (!this.isJumping) { this.velY = this.jumpPower; this.isJumping = true; }
        }
    };

    let platforms = [];
    let bones = [];
    let cats = [];

    function loadLevel(level) {
        segawon.x = 100;
        segawon.y = 300;
        segawon.velY = 0;
        win = false;

        if (level === 1) {
            currentWorldWidth = 3000;
            platforms = [
                { x: 300, y: 320, w: 120, h: 20 }, { x: 550, y: 240, w: 100, h: 20 },
                { x: 800, y: 320, w: 150, h: 20 }, { x: 1200, y: 250, w: 200, h: 20 }
            ];
            cats = [
                { x: 450, y: FLOOR_Y - 30, w: 35, h: 30, speed: 2, minX: 350, maxX: 600 },
                { x: 950, y: FLOOR_Y - 30, w: 35, h: 30, speed: -2, minX: 800, maxX: 1100 }
            ];
        } else if (level === 2) {
            currentWorldWidth = 4500;
            platforms = [
                { x: 300, y: 280, w: 100, h: 20 }, { x: 600, y: 340, w: 150, h: 20 },
                { x: 900, y: 220, w: 100, h: 20 }, { x: 1300, y: 300, w: 120, h: 20 }
            ];
            cats = [
                { x: 450, y: FLOOR_Y - 30, w: 35, h: 30, speed: 3.5, minX: 350, maxX: 650 },
                { x: 1050, y: FLOOR_Y - 30, w: 35, h: 30, speed: -3.5, minX: 900, maxX: 1250 }
            ];
        } else if (level === 3) {
            currentWorldWidth = 6000;
            platforms = [
                { x: 300, y: 250, w: 80, h: 20 }, { x: 650, y: 220, w: 80, h: 20 },
                { x: 1000, y: 300, w: 100, h: 20 }
            ];
            cats = [
                { x: 450, y: FLOOR_Y - 30, w: 35, h: 30, speed: 5, minX: 300, maxX: 700 }
            ];
        }

        bones = [];
        let totalBones = level === 1 ? 25 : level === 2 ? 40 : 55;
        for(let i = 0; i < totalBones; i++) {
            bones.push({ x: 250 + (i * 105) + Math.random() * 25, y: Math.random() * 150 + 200, w: 24, h: 14, collected: false });
        }
    }

    loadLevel(currentLevel);

    const bLeft = document.getElementById('btnLeft');
    const bRight = document.getElementById('btnRight');
    const bJump = document.getElementById('btnJump');

    bLeft.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowLeft'] = true; });
    bLeft.addEventListener('touchend', () => keys['ArrowLeft'] = false);
    bRight.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowRight'] = true; });
    bRight.addEventListener('touchend', () => keys['ArrowRight'] = false);
    
    bJump.addEventListener('touchstart', (e) => { 
        e.preventDefault(); 
        if (gameOver || totalWin) { location.reload(); } 
        else if (win) { currentLevel++; loadLevel(currentLevel); } 
        else { segawon.jump(); }
    });

    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft' || e.key === 'a') keys['ArrowLeft'] = true;
        if (e.key === 'ArrowRight' || e.key === 'd') keys['ArrowRight'] = true;
        if (['Space', 'ArrowUp', 'w', ' '].includes(e.key)) {
            if (win && !totalWin) { currentLevel++; loadLevel(currentLevel); } else { segawon.jump(); }
        }
        if (gameOver || totalWin) { if(e.key === 'r' || e.key === 'R') location.reload(); }
    });
    window.addEventListener('keyup', e => {
        if (e.key === 'ArrowLeft' || e.key === 'a') keys['ArrowLeft'] = false;
        if (e.key === 'ArrowRight' || e.key === 'd') keys['ArrowRight'] = false;
    });

    function isColliding(r1, r2) {
        return r1.x < r2.x + r2.w && r1.x + r1.width > r2.x && r1.y < r2.y + r2.h && r1.y + r1.height > r2.y;
    }

    function update() {
        if (gameOver || win || totalWin) return;
        gameTime++;
        segawon.update();

        platforms.forEach(plat => {
            if (segawon.x + segawon.width > plat.x && segawon.x < plat.x + plat.w) {
                if (segawon.velY > 0 && segawon.y + segawon.height - segawon.velY <= plat.y) {
                    if (segawon.y + segawon.height >= plat.y) {
                        segawon.y = plat.y - segawon.height;
                        segawon.velY = 0;
                        segawon.isJumping = false;
                    }
                }
            }
        });

        bones.forEach(b => {
            if (!b.collected && isColliding(segawon, b)) { b.collected = true; score += 10; }
        });

        cats.forEach(cat => {
            cat.x += cat.speed;
            if (cat.x < cat.minX || cat.x > cat.maxX) cat.speed *= -1;
            if (isColliding(segawon, cat)) {
                lives--; segawon.velY = -8; segawon.x += (cat.speed > 0) ? 40 : -40;
                if (lives <= 0) gameOver = true;
            }
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#5cb85c";
        let totalHills = Math.ceil(currentWorldWidth / 400) + 1;
        for (let i = 0; i < totalHills; i++) {
            ctx.beginPath(); ctx.arc((i * 400) - (camera.x * 0.3), 450, 250, 0, Math.PI * 2); ctx.fill();
        }

        ctx.fillStyle = "#2e7d32"; ctx.fillRect(0 - camera.x, FLOOR_Y, currentWorldWidth, canvas.height - FLOOR_Y);
        ctx.fillStyle = "#4caf50"; ctx.fillRect(0 - camera.x, FLOOR_Y, currentWorldWidth, 8);
        platforms.forEach(plat => {
            ctx.fillStyle = "#A0522D"; ctx.fillRect(plat.x - camera.x, plat.y, plat.w, plat.h);
            ctx.fillStyle = "#CD853F"; ctx.fillRect(plat.x - camera.x, plat.y, plat.w, 4);
        });

        bones.forEach(b => {
            if (!b.collected) {
                ctx.fillStyle = "#FFFFF0"; ctx.fillRect(b.x - camera.x + 4, b.y + 4, 16, 6);
                ctx.fillRect(b.x - camera.x, b.y, 6, 6); ctx.fillRect(b.x - camera.x, b.y + 8, 6, 6);
                ctx.fillRect(b.x - camera.x + 18, b.y, 6, 6); ctx.fillRect(b.x - camera.x + 18, b.y + 8, 6, 6);
            }
        });

        cats.forEach(cat => {
            ctx.fillStyle = "#FF8C00"; ctx.fillRect(cat.x - camera.x, cat.y + 5, cat.w, cat.h - 5);
            ctx.fillRect(cat.x - camera.x + (cat.speed > 0 ? 20 : 0), cat.y, 15, 15);
        });

        ctx.fillStyle = "#FFD700"; ctx.fillRect(currentWorldWidth - 150 - camera.x, FLOOR_Y - 150, 10, 150);
        ctx.fillStyle = "#FF0000"; ctx.fillRect(currentWorldWidth - 140 - camera.x, FLOOR_Y - 150, 60, 40);

        // UI Text
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 20px 'Courier New'";
        ctx.fillText("SCORE: " + score, 20, 40);
        let hearts = ""; for(let i=0; i<lives; i++) hearts += "❤️";
        ctx.fillText("LIVES: " + hearts, 20, 70);
        ctx.fillText("LEVEL: " + currentLevel, 600, 40);
        ctx.fillText("PROGRESS: " + Math.round((segawon.x / currentWorldWidth) * 100) + "%", 570, 70);

        // --- 👑 FIXED WATERMARK DRAW LOGIC (3 KOTAK BERJAJAR BERGANTIAN) ---
        // 1. Gambar Logo SMK (Posisi X: 20)
        if (smkLoaded) {
            ctx.drawImage(logoSmk, 20, 95, 40, 40);
        } else {
            ctx.fillStyle = "rgba(0, 0, 255, 0.7)"; ctx.fillRect(20, 95, 40, 40);
            ctx.fillStyle = "#FFF"; ctx.font = "bold 10px Arial"; ctx.fillText("SMK", 28, 118);
        }
        
        // 2. Gambar Logo Grup (Posisi X: 70)
        if (grupLoaded) {
            ctx.drawImage(logoGrup, 70, 95, 40, 40);
        } else {
            ctx.fillStyle = "rgba(40, 167, 69, 0.7)"; ctx.fillRect(70, 95, 40, 40); // Warna Hijau
            ctx.fillStyle = "#FFF"; ctx.font = "bold 10px Arial"; ctx.fillText("GRUP", 75, 118);
        }

        // 3. Gambar Logo Moko (Posisi X: 120)
        if (mokoLoaded) {
            ctx.drawImage(logoMoko, 120, 95, 40, 40);
        } else {
            ctx.fillStyle = "rgba(220, 53, 69, 0.7)"; ctx.fillRect(120, 95, 40, 40); // Warna Merah
            ctx.fillStyle = "#FFF"; ctx.font = "bold 10px Arial"; ctx.fillText("MOKO", 123, 118);
        }

        if (gameOver) {
            ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#FF0000"; ctx.font = "bold 35px Arial"; ctx.fillText("GAME OVER", 300, 220);
        }
        if (win && !totalWin) {
            ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#FFD700"; ctx.font = "bold 35px Arial"; ctx.fillText(`LEVEL ${currentLevel} SELESAI!`, 240, 220);
        }
        if (totalWin) {
            ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00FF00"; ctx.font = "bold 35px Arial"; ctx.fillText("TAMAT! 👑🏆", 170, 220);
        }

        segawon.draw();
    }

    function game() { update(); draw(); setTimeout(game, 1000 / FPS); }
    game();
</script>
</body>
</html>
